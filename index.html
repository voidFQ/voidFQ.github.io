<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID FQ</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
    min-height:100vh;
    background-image: url("https://majestic-rp.ru/images/home/showcase/cover.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* затемнение фона */
body::after {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    top:0;
    left:0;
    z-index:0;
}

/* Контейнер */
.center {
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

/* VOID стиль */
.void-title {
    font-size:120px;
    font-weight:900;
    color:black;
    letter-spacing:15px;
    text-transform:uppercase;

    /* НЕОН */
    text-shadow:
        0 0 5px #8a2be2,
        0 0 10px #8a2be2,
        0 0 20px #8a2be2,
        0 0 40px #8a2be2,
        0 0 80px #8a2be2;

    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow:
            0 0 5px #8a2be2,
            0 0 15px #8a2be2,
            0 0 30px #8a2be2;
    }
    to {
        text-shadow:
            0 0 20px #a855f7,
            0 0 40px #a855f7,
            0 0 80px #a855f7;
    }
}

/* Подпись */
.subtitle {
    margin-top:20px;
    font-size:22px;
    color:#aaa;
    letter-spacing:5px;
}

/* Частицы */
canvas {
    position:absolute;
    top:0;
    left:0;
    z-index:1;
}
</style>
</head>
<body>

<div class="center">
    <div class="void-title">VOID</div>
    <div class="subtitle">FACTION</div>
</div>

<canvas id="particles"></canvas>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;   // крупнее
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }

    draw(){
        ctx.fillStyle = "rgba(168,85,247,0.9)"; // ярче
        ctx.shadowColor = "#a855f7";
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init(){
    particlesArray = [];
    for(let i = 0; i < 150; i++){ // больше частиц
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", function(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});
</script>

</body>
</html>
