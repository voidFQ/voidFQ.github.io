<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOID FQ</title>

<!-- Мафиозный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    min-height:100vh;
    background-image: url("https://majestic-rp.ru/images/home/showcase/cover.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Cinzel', serif;
    color:white;
    overflow:hidden;
}

/* Затемнение */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index:1;
}

/* ЛОГО */
.brand-logo {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    z-index: 3;
    mix-blend-mode: screen;
    animation: fadeInLogo 2s ease forwards;
    opacity:0;
}

@keyframes fadeInLogo {
    to { opacity:1; }
}

/* Центр */
.center {
    position: relative;
    z-index: 3;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    max-width:900px;
    margin:auto;
    min-height:100vh;
}

/* Текст без рамки */
.text-block {
    font-size:24px;
    line-height:1.9;
    letter-spacing:1.5px;
    max-width:850px;

    text-shadow:
        0 0 10px rgba(0,0,0,0.8),
        0 0 25px rgba(0,0,0,0.6);

    animation: fadeUp 2s ease forwards;
    opacity:0;
    transform: translateY(30px);
}

/* Анимация текста */
@keyframes fadeUp {
    to {
        opacity:1;
        transform: translateY(0);
    }
}

/* Кнопка */
.king-btn {
    margin-top:60px;
    padding:22px 70px;
    font-size:26px;
    font-weight:900;
    border-radius:4px;
    text-decoration:none;
    color:#111;
    background: linear-gradient(45deg,#d4af37,#b8860b);
    transition:0.3s;
    display:inline-block;
    letter-spacing:2px;

    box-shadow:
        0 0 15px rgba(212,175,55,0.7);

    opacity:0;
    transform: translateY(30px);
    animation: fadeUp 2s ease forwards;
    animation-delay:1s;
}

.king-btn:hover {
    transform: scale(1.1);
    box-shadow:
        0 0 25px rgba(212,175,55,1),
        0 0 60px rgba(212,175,55,0.8);
}
</style>
</head>

<body>

<div class="overlay"></div>

<img src="logo.png" class="brand-logo">

<div class="center">
    <div class="text-block">
VOID — сила. Стиль. Дисциплина.<br><br>

Мы не участвуем в игре.<br>
Мы управляем ею.<br><br>

Капты — под контролем.<br>
Бизнес — под влиянием.<br>
Конкуренция — под давлением.<br><br>

VOID — это не просто название.<br>
Это статус.<br>
Это власть.<br>
Это наследие.
    </div>

    <a class="king-btn" href="https://discord.gg/E6P5Jgr6" target="_blank">
        👑 СТАТЬ КОРОЛЁМ
    </a>
</div>

</body>
</html>
