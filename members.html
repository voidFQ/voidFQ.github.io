<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID — Участники</title>

<style>
* { box-sizing: border-box; }

body {
    margin:0;
    min-height:100vh;
    background-image: url("https://majestic-rp.ru/images/home/showcase/cover.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color:white;
}

/* затемнение */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index:1;
}

/* логотип */
.brand-logo {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 200px;
    z-index: 5;
    mix-blend-mode: screen;
}

/* контейнер */
.center {
    position: relative;
    z-index: 3;
    max-width: 800px;
    margin: auto;
    padding:120px 20px 60px;
}

/* заголовок */
h1 {
    text-align:center;
    margin-bottom:30px;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
}

/* поиск */
.search {
    width:100%;
    padding:15px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color:white;
    margin-bottom:30px;
    font-size:16px;
    text-align:center;
    backdrop-filter: blur(5px);
}

.search::placeholder {
    color: rgba(255,255,255,0.6);
}

.search:focus {
    outline:none;
    border-color:#d4af37;
}

/* список */
.member {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    margin-bottom:10px;
    background: rgba(0,0,0,0.5);
    border-radius:40px;
    backdrop-filter: blur(4px);
}

.role {
    font-weight:bold;
}

/* роли */
.leader { color: gold; }
.dev { color: #00ff99; }
.high { color: violet; }
.member-role { color: #ccc; }

/* фикс кнопка назад */
.back-btn {
    position: fixed;
    bottom: 30px;
    left: 30px;
    padding:15px 35px;
    border-radius:40px;
    background: linear-gradient(45deg,#d4af37,#b8860b);
    color:#111;
    text-decoration:none;
    font-weight:bold;
    z-index: 10;
    transition:0.3s;
    box-shadow:0 0 15px rgba(212,175,55,0.8);
}

.back-btn:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<div class="overlay"></div>
<img src="logo.png" class="brand-logo" alt="VOID logo">

<div class="center">

<h1>Список участников VOID</h1>

<input type="text" id="search" class="search" placeholder="Поиск">

<div id="list"></div>

</div>

<a href="index.html" class="back-btn">← Назад</a>

<script>
const members = [
  {nick:"Sok | 243740 ds sok_void", role:"Лидер", class:"leader"},
  {nick:"xorelsem ds corpses1", role:"Программист", class:"dev"},
  {nick:"Bleze", role:"Хай состав", class:"high"},

  {nick:"Neon | 21898", role:"Хай состав", class:"high"},
  {nick:"Kano | 246352 ds enzza_what", role:"Хай состав", class:"high"},
  {nick:"lDavagaba | void ds pudge90123", role:"Хай состав", class:"high"},
  {nick:"l.shayrma", role:"Участник", class:"member-role"},
  {nick:"Arseniy Tokorev | 2870", role:"Участник", class:"member-role"},
  {nick:"Andrey Diaz", role:"Участник", class:"member-role"},
  {nick:"Danonchik", role:"Участник", class:"member-role"},
  {nick:"funochi", role:"Участник", class:"member-role"},
  {nick:"iSakume_RU", role:"Участник", class:"member-role"},
  {nick:"Jacobo | 265853", role:"Участник", class:"member-role"},
  {nick:"Koco | 1337", role:"Участник", class:"member-role"},
  {nick:"Mario", role:"Участник", class:"member-role"},
  {nick:"Monster", role:"Участник", class:"member-role"},
  {nick:"pasha", role:"Участник", class:"member-role"},
  {nick:"Shura | 278990", role:"Участник", class:"member-role"},
  {nick:"So1m_so", role:"Участник", class:"member-role"},
  {nick:"SOMZO", role:"Участник", class:"member-role"},
  {nick:"Sosori Yamato", role:"Участник", class:"member-role"},
  {nick:"Stasik Kolbasenko", role:"Участник", class:"member-role"},
  {nick:"Temych | 276919", role:"Участник", class:"member-role"},
  {nick:"Timau Exotique", role:"Участник", class:"member-role"},
  {nick:"Uncoverj", role:"Участник", class:"member-role"},
  {nick:"VASA", role:"Участник", class:"member-role"},
  {nick:"Viktor", role:"Участник", class:"member-role"},
  {nick:"Vlad | 246362", role:"Участник", class:"member-role"},
  {nick:"Walter | 280095", role:"Участник", class:"member-role"},
  {nick:"ytka_TiV", role:"Участник", class:"member-role"}
];

const list = document.getElementById("list");
const search = document.getElementById("search");

function render(filter="") {
  list.innerHTML = "";
  members
    .filter(m => m.nick.toLowerCase().includes(filter.toLowerCase()))
    .forEach(m => {
      list.innerHTML += `
        <div class="member">
          <div>${m.nick}</div>
          <div class="role ${m.class}">${m.role}</div>
        </div>
      `;
    });
}

search.addEventListener("input", e => render(e.target.value));
render();
</script>

</body>
</html>
